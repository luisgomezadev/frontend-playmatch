<app-layout [title]="'Reservas'" [subtitle]="'Aquí puedes ver todas tus reservas activas.'">
  @if (!loadingVenue) {
  @if (venue) {
  <div class="rounded-3xl border border-gray-100 bg-white shadow-lg p-5 sm:p-6">
  <div class="flex items-center justify-between">
    <div class="flex flex-col">
      <h3 class="text-lg lg:text-xl font-bold text-gray-900 capitalize leading-tight">
        {{ formattedDate }}
      </h3>
      <p class="text-sm text-gray-500">{{ year }}</p>
    </div>
    <div class="flex items-center gap-2 sm:gap-3">
      <button
        (click)="loadReservations()"
        class="flex items-center gap-2 rounded-2xl border border-gray-200 bg-gray-50 py-2.5 px-4 text-xs font-semibold text-gray-600 transition-all duration-300 hover:-translate-y-0.5 hover:bg-white hover:shadow-md">
        <i class="fa-solid fa-rotate-right"></i>
        <span class="hidden sm:inline-block">Refrescar</span>
      </button>
      <div class="flex items-center gap-2">
        <button
          (click)="prevDay()"
          aria-label="Día anterior"
          class="flex h-10 w-10 items-center justify-center rounded-2xl bg-primary/10 text-primary transition-all duration-300 hover:-translate-y-0.5 hover:bg-primary hover:text-white hover:shadow-md">
          <i class="fa-solid fa-arrow-left text-sm"></i>
        </button>
        <button
          (click)="nextDay()"
          aria-label="Día siguiente"
          class="flex h-10 w-10 items-center justify-center rounded-2xl bg-primary/10 text-primary transition-all duration-300 hover:-translate-y-0.5 hover:bg-primary hover:text-white hover:shadow-md">
          <i class="fa-solid fa-arrow-right text-sm"></i>
        </button>
      </div>
    </div>
  </div>
</div>
  @if (loading) {
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
    @for (i of [1, 2]; track $index) {
    <div class="p-4 rounded-xl border border-gray-200 bg-white space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4 flex-1">
          <div class="w-12 h-12 rounded-full shimmer"></div>
          <div class="h-8 w-1/2 rounded shimmer"></div>
        </div>
        <div class="h-5 w-1/3 rounded shimmer"></div>
      </div>
      <div class="h-10 rounded shimmer"></div>
      <div class="grid grid-cols-3 gap-3">
        <div class="h-10 rounded shimmer"></div>
        <div class="h-10 rounded shimmer"></div>
        <div class="h-10 rounded shimmer"></div>
      </div>
    </div>
    }
  </div>
  } @else {
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
    @for (r of reservations; track r.id) {
    <app-reservation-card
      [reservation]="r"
      [fieldName]="fieldsById.get(r.fieldId) ?? 'Cancha'"
      (reservationCanceled)="loadReservations()" />
    } @empty {
    <div
      class="flex flex-col items-center justify-center p-8 bg-gradient-to-r from-gray-50 to-white border border-dashed border-gray-300 rounded-xl shadow-sm hover:shadow-md transition-all duration-300 text-center sm:col-span-2">
      <div class="flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 text-gray-700 mb-4">
        <i class="fa-solid fa-calendar-check text-3xl"></i>
      </div>
      <h3 class="text-lg sm:text-xl font-bold text-gray-700 mb-1">Aún no tienes reservas</h3>
      <p class="text-sm sm:text-base text-gray-600">No se han registrado reservas para este día.</p>
    </div>
    }
  </div>
  }
  } @else {
  <app-create-venue-card />
  }
  }
</app-layout>
