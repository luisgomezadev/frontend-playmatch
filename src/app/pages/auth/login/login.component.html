<app-navbar />

<section
  class="min-h-screen pt-28 pb-20 px-4 bg-gradient-to-br from-gray-50 via-white to-gray-100 flex items-center justify-center">

  <div
    class="w-full max-w-md bg-white rounded-3xl border border-gray-100 shadow-lg hover:shadow-xl transition-shadow duration-300 p-8 motion-preset-slide-up-sm motion-duration-1000">

    <div class="flex flex-col items-center mb-8">

      <h1 class="text-3xl font-bold text-gray-900">
        Iniciar sesión
      </h1>

      <p class="text-gray-500 text-center mt-2">
        Ingresa a tu cuenta para administrar tus reservas.
      </p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

      <div>
        <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">

          Correo electrónico

        </label>

        <div class="relative">

          <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-primary"
            fill="none" viewBox="0 0 24 24" stroke="currentColor">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 12H8m8-4H8m8 8H8M4 6h16v12H4z" />

          </svg>

          <input id="email" type="email" formControlName="email" placeholder="correo@ejemplo.com"
            class="w-full pl-12 pr-4 py-3.5 border border-gray-200 bg-gray-50 rounded-2xl focus:ring-4 focus:ring-primary/10 focus:border-primary focus:bg-white outline-none transition-all" />

        </div>
      </div>

      <div>

        <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">

          Contraseña

        </label>

        <div class="relative">

          <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-primary"
            fill="none" viewBox="0 0 24 24" stroke="currentColor">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 15v2m-6 0h12a2 2 0 002-2v-5a2 2 0 00-2-2h-1V7a5 5 0 00-10 0v1H6a2 2 0 00-2 2v5a2 2 0 002 2zm3-9a3 3 0 016 0v1H9V7z" />

          </svg>

          <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
            placeholder="••••••••"
            class="w-full pl-12 pr-12 py-3.5 border border-gray-200 bg-gray-50 rounded-2xl focus:ring-4 focus:ring-primary/10 focus:border-primary focus:bg-white outline-none transition-all" />

          <button type="button" (click)="togglePasswordVisibility()" tabindex="-1"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors">

            @if(showPassword){

            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">

              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.038 10.038 0 013.642-5.042M6.18 6.18l11.64 11.64M9.88 9.88a3 3 0 004.24 4.24" />

            </svg>

            } @else {

            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">

              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0" />

              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.522 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.478 0-8.268-2.943-9.542-7z" />

            </svg>

            }

          </button>

        </div>

      </div>

      <div class="mt-6">
        <app-button type="submit" size="big" [disabled]="loginForm.invalid">

          @if (loading) {

          <app-loading-text-component text="Ingresando" />

          } @else {

          Iniciar sesión

          }

        </app-button>
      </div>

    </form>

    <hr class="my-8 border-gray-100" />

    <p class="text-center text-sm text-gray-500">

      ¿No tienes una cuenta?

      <a routerLink="/registro" class="font-semibold text-primary hover:underline ml-1">

        Crear cuenta

      </a>

    </p>

  </div>

</section>

<app-footer />
